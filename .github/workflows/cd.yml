name: Deploy to AWS EC2

on:
  workflow_run:
    workflows: ["Docker Image CI"]   # ⚠️ must match CI name
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull ramram27/backend-devops:latest
          docker rm -f backend-devops || true
          docker run -d -p 80:3000 --name backend-devops ramram27/backend-devops:latest