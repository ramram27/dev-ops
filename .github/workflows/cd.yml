name: deploy to aws ec2

on:
  workflow_run:
    workflows: ["Docker Image CI"]
    types:
      - completed

jobs:
    deploy:
    
        runs-on: ubuntu-latest
    
        steps:
        - name: deploy to aws ec2 instance
          run: sudo docker pull ramram27/backend-devops:latest
        - name: Delete old container
          run: sudo docker rm -f backend-devops || true
        - name: Run new container
          run: sudo docker run -d -p 80:80 --name backend-devops ramram27/backend-devops:latest